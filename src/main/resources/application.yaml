server:
  port: ${SERVER_PORT:8080}

  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/api}
    session:
      timeout: 30m
    encoding:
      enabled: true
      charset: UTF-8
      force: true

  tomcat:
    threads:
      max: 200
      min-spare: 10
    max-connections: 8192
    accept-count: 100
    connection-timeout: 20000
    access-log:
      enabled: true
      directory: logs
      pattern: '%h %l %u %t "%r" %s %b %D'

spring:
  application:
    name: LoginAuthentication

  main:
    allow-bean-definition-overriding: true

  profiles:
    active: dev

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

page-helper:
  helperDialect: mysql
  reasonable: true
  supportMethodsArguments: true
  params: count=countSql
  autoRuntimeDialect: false

knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true

logging:
  level:
    root: info
    com.xiaoteng: info
    org.springframework.boot.autoconfigure: info

jwt:
  secret: ${JWT_SECRET:your_secret_key_here}
  expiration: 3600
  refresh-expiration: 86400
  header: Authorization
  prefix: "Bearer "
  issuer: your-app-name
  subject: user
  algorithm: HS256
  clock-skew: 60

aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT}
    region: ${OSS_REGION}
    bucket-name: ${OSS_BUCKET_NAME}
    url-prefix: ${OSS_URL_PREFIX}
    access-key-id: ${OSS_ACCESS_KEY_ID}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}

file:
  path:
    prefix: upload
    use-date-path: true
